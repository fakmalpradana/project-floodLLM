# ════════════════════════════════════════════════════════════════════════════
# FloodLLM — CI/CD Pipeline
# Builds and deploys backend + frontend to GCP Cloud Run on every push to main.
#
# ── HOW TO AUTHENTICATE (Workload Identity Federation — keyless, best practice)
#
#   Run the one-time setup below in your terminal, then add the 8 secrets
#   listed in the "REQUIRED GITHUB SECRETS" section to your repo.
#
# ── ONE-TIME GCP SETUP (run once from your local machine) ──────────────────
#
#   export PROJECT_ID="floodllm-akmal-23503"
#   export PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID \
#     --format='value(projectNumber)')
#   export REPO="your-github-org/your-repo-name"   # ← change this
#
#   # 1. Create a Workload Identity Pool
#   gcloud iam workload-identity-pools create "github-pool" \
#     --location="global" \
#     --display-name="GitHub Actions Pool" \
#     --project=$PROJECT_ID
#
#   # 2. Create an OIDC Provider inside the pool
#   gcloud iam workload-identity-pools providers create-oidc "github-provider" \
#     --location="global" \
#     --workload-identity-pool="github-pool" \
#     --display-name="GitHub Provider" \
#     --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository" \
#     --issuer-uri="https://token.actions.githubusercontent.com" \
#     --project=$PROJECT_ID
#
#   # 3. Create the CI Service Account
#   gcloud iam service-accounts create "github-actions-sa" \
#     --display-name="GitHub Actions Service Account" \
#     --project=$PROJECT_ID
#
#   # 4. Grant it the required IAM roles
#   for ROLE in \
#     roles/run.admin \
#     roles/artifactregistry.writer \
#     roles/cloudbuild.builds.editor \
#     roles/iam.serviceAccountUser \
#     roles/storage.objectAdmin; do
#     gcloud projects add-iam-policy-binding $PROJECT_ID \
#       --member="serviceAccount:github-actions-sa@${PROJECT_ID}.iam.gserviceaccount.com" \
#       --role="$ROLE"
#   done
#
#   # 5. Allow WIF to impersonate the Service Account (scoped to your repo)
#   gcloud iam service-accounts add-iam-policy-binding \
#     "github-actions-sa@${PROJECT_ID}.iam.gserviceaccount.com" \
#     --role="roles/iam.workloadIdentityUser" \
#     --member="principalSet://iam.googleapis.com/projects/${PROJECT_NUMBER}/locations/global/workloadIdentityPools/github-pool/attribute.repository/${REPO}" \
#     --project=$PROJECT_ID
#
#   # 6. Print the WIF Provider name → use as WIF_PROVIDER secret
#   gcloud iam workload-identity-pools providers describe github-provider \
#     --location="global" \
#     --workload-identity-pool="github-pool" \
#     --project=$PROJECT_ID \
#     --format='value(name)'
#   # Example output:
#   # projects/574571002226/locations/global/workloadIdentityPools/github-pool/providers/github-provider
#
# ── REQUIRED GITHUB SECRETS ────────────────────────────────────────────────
#   Go to: Repository → Settings → Secrets and variables → Actions → New secret
#
#   Secret name              │ Value / where to get it
#   ─────────────────────────┼──────────────────────────────────────────────────
#   WIF_PROVIDER             │ Output of step 6 above (full resource name)
#                            │ e.g. projects/574571002226/locations/global/
#                            │      workloadIdentityPools/github-pool/providers/github-provider
#   WIF_SERVICE_ACCOUNT      │ github-actions-sa@floodllm-akmal-23503.iam.gserviceaccount.com
#   GCP_PROJECT_ID           │ floodllm-akmal-23503
#   GOOGLE_API_KEY           │ Your Google Gemini API key
#   COPERNICUS_USERNAME      │ Your Copernicus Data Space username
#   COPERNICUS_PASSWORD      │ Your Copernicus Data Space password
#   NASA_EARTHDATA_USERNAME  │ Your NASA Earthdata username
#   NASA_EARTHDATA_PASSWORD  │ Your NASA Earthdata password
#
# ════════════════════════════════════════════════════════════════════════════

name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual re-runs from GitHub UI

# ── Workflow-level env ──────────────────────────────────────────────────────
env:
  PROJECT_ID:       ${{ secrets.GCP_PROJECT_ID }}
  REGION:           asia-southeast1
  ARTIFACT_REPO:    floodllm
  BACKEND_SERVICE:  floodllm-backend
  FRONTEND_SERVICE: floodllm-frontend
  # ── Task 3: force all JS actions to run on Node 24 instead of Node 20 ──
  # This silences the "Node.js 20 deprecation" warnings from actions/checkout,
  # google-github-actions/auth, google-github-actions/setup-gcloud, etc.
  # Remove once those actions ship a native Node 24 release.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ── Job 1: Build & deploy backend ──────────────────────────────────────────
jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # REQUIRED for Workload Identity Federation

    outputs:
      backend_url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Task 2 fix ──────────────────────────────────────────────────────
      # The auth action requires EXACTLY ONE of:
      #   • workload_identity_provider  (WIF — keyless, preferred)
      #   • credentials_json            (Service Account JSON key)
      #
      # Previously the secrets were named GCP_WORKLOAD_IDENTITY_PROVIDER /
      # GCP_SERVICE_ACCOUNT. If those secrets were not yet created in GitHub,
      # both resolved to empty strings and the action threw:
      #   "must specify exactly one of workload_identity_provider or credentials_json"
      #
      # Fix: rename to WIF_PROVIDER / WIF_SERVICE_ACCOUNT (shorter, unambiguous)
      # and add token_format so downstream steps can use the OIDC token.
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format:               access_token   # gives gcloud + docker a usable token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend image
        env:
          IMAGE:  ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}
          LATEST: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:latest
        run: |
          docker build -f Dockerfile.backend -t "$IMAGE" -t "$LATEST" .
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}
          region:  ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=2Gi
            --cpu=2
            --timeout=300
            --concurrency=10
          env_vars: |
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            COPERNICUS_USERNAME=${{ secrets.COPERNICUS_USERNAME }}
            COPERNICUS_PASSWORD=${{ secrets.COPERNICUS_PASSWORD }}
            NASA_EARTHDATA_USERNAME=${{ secrets.NASA_EARTHDATA_USERNAME }}
            NASA_EARTHDATA_PASSWORD=${{ secrets.NASA_EARTHDATA_PASSWORD }}
            GCP_PROJECT_ID=${{ env.PROJECT_ID }}
            APP_ENV=production

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL: $URL"

# ── Job 2: Build & deploy frontend ─────────────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend       # must finish first — we embed the backend URL
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format:               access_token

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push frontend image
        env:
          IMAGE:       ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:${{ github.sha }}
          LATEST:      ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:latest
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend_url }}
        run: |
          docker build \
            -f Dockerfile.frontend \
            --build-arg "VITE_API_URL=$BACKEND_URL" \
            -t "$IMAGE" \
            -t "$LATEST" \
            .
          docker push "$IMAGE"
          docker push "$LATEST"

      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          image:   ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:${{ github.sha }}
          region:  ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --port=8080

      - name: Print live URLs
        run: |
          FRONTEND_URL=$(gcloud run services describe "${{ env.FRONTEND_SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format 'value(status.url)')
          BACKEND_URL="${{ needs.deploy-backend.outputs.backend_url }}"
          echo ""
          echo "╔══════════════════════════════════════════════╗"
          echo "  FloodLLM deployed successfully!"
          echo "  Frontend : $FRONTEND_URL"
          echo "  Backend  : $BACKEND_URL"
          echo "╚══════════════════════════════════════════════╝"
